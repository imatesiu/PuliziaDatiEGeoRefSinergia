services:
  pulizia-dati-sinergia:
    build: .
    container_name: pulizia-dati-sinergia
    ports:
      - "9382:8443"
    environment:
      HOST: 0.0.0.0
      PORT: 8443
      TLS_ENABLED: "true"
      TLS_CERT_FILE: /app/tls/fullchain.pem
      TLS_KEY_FILE: /app/tls/privkey.pem
      GEOCODER_CACHE_DIR: /app/cache
    volumes:
      - ./cache:/app/cache
    restart: unless-stopped
